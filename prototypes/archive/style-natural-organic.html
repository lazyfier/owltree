<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owltree - 自然有机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfcfa;
            --paper-warm: #faf8f5;
            --ink: #2c2c2c;
            --ink-light: #5a5a5a;
            --sage: #8b9d83;
            --sage-light: #a8b8a0;
            --terracotta: #c17f59;
            --sand: #d4c4b0;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
            color: var(--ink);
        }
        
        .font-serif { font-family: 'EB Garamond', serif; }
        
        /* 有机形状 */
        .organic-blob {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        
        .organic-blob-2 {
            border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
        }
        
        /* 手写风格分隔线 */
        .hand-drawn-line {
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                var(--sand),
                var(--sand) 20px,
                transparent 20px,
                transparent 22px
            );
            opacity: 0.6;
        }
        
        /* 自然按钮 */
        .nature-btn {
            background: transparent;
            border: 1.5px solid var(--sage);
            color: var(--ink);
            padding: 14px 28px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nature-btn:hover {
            background: var(--sage);
            color: white;
            border-radius: 28px 20px 32px 24px;
        }
        
        .nature-btn-primary {
            background: var(--terracotta);
            border-color: var(--terracotta);
            color: white;
        }
        
        .nature-btn-primary:hover {
            background: var(--sage);
            border-color: var(--sage);
        }
        
        /* 有机卡片 */
        .nature-card {
            background: white;
            border-radius: 20px 28px 24px 32px;
            padding: 28px;
            box-shadow: 
                0 4px 20px rgba(139, 157, 131, 0.08),
                0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(139, 157, 131, 0.15);
        }
        
        /* 不规则标签 */
        .nature-tag {
            display: inline-block;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 16px 12px 20px 14px;
            background: rgba(139, 157, 131, 0.12);
            color: var(--sage);
        }
        
        /* 植物装饰 */
        .plant-deco {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.3;
        }
        
        .plant-deco::before {
            content: '🌿';
            font-size: 24px;
        }
        
        /* 墨水效果进度条 */
        .ink-progress {
            height: 6px;
            background: rgba(139, 157, 131, 0.15);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .ink-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sage), var(--terracotta));
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-6 py-12 max-w-3xl relative">
        
        <div class="plant-deco" style="top: 40px; right: 60px;"></div>
        <div class="plant-deco" style="bottom: 100px; left: 40px; transform: rotate(45deg);"></div>
        
        <header class="text-center mb-16">
            <div class="w-20 h-20 mx-auto mb-6 organic-blob bg-gradient-to-br from-[#8b9d83] to-[#c17f59] flex items-center justify-center text-white text-2xl">
                🦉
            </div>
            <h1 class="font-serif text-4xl italic mb-3">Owltree</h1>
            <div class="hand-drawn-line w-24 mx-auto mb-4"></div>
            <p class="text-sm text-[#5a5a5a]">自然有机风格 / Natural & Organic</p>
        </header>
        
        <nav class="flex justify-center gap-4 mb-12">
            <button class="nature-btn nature-btn-primary">开始旅程</button>
            <button class="nature-btn">继续</button>
            <button class="nature-btn">设置</button>
        </nav>
        
        <section class="nature-card mb-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-3 h-3 rounded-full bg-[#8b9d83]"></div>
                <span class="text-xs text-[#5a5a5a] tracking-wide">当前状态</span>
            </div>
            
            <div class="space-y-5">
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-[#5a5a5a]">生命值</span>
                        <span>75/100</span>
                    </div>
                    <div class="ink-progress">
                        <div class="ink-progress-fill" style="width: 75%;"></div>
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-[#5a5a5a]">焦虑值</span>
                        <span>45/100</span>
                    </div>
                    <div class="ink-progress">
                        <div class="ink-progress-fill" style="width: 45%; opacity: 0.7;"></div>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 pt-5 flex gap-8 text-sm" style="border-top: 1px solid rgba(139, 157, 131, 0.15);">
                <div>
                    <span class="text-[#5a5a5a] text-xs block mb-1">回合</span>
                    <span>第 3 轮</span>
                </div>
                <div>
                    <span class="text-[#5a5a5a] text-xs block mb-1">道具</span>
                    <span>检测试剂 x2</span>
                </div>
            </div>
        </section>
        
        <section class="nature-card organic-blob-2" style="background: linear-gradient(135deg, rgba(139,157,131,0.08), rgba(193,127,89,0.08));">
            <p class="font-serif text-lg leading-relaxed italic mb-4">
                "欢迎来到月抛模拟器。在这个自然流动的世界中，每一个选择都像风中的叶子，带着它独特的轨迹。"
            </p>
            <p class="text-xs text-[#5a5a5a]">— 系统提示</p>
        </section>
        
        <section class="mt-6 flex flex-wrap gap-3">
            <span class="nature-tag">安全</span>
            <span class="nature-tag" style="background: rgba(193,127,89,0.15); color: var(--terracotta);">注意</span>
            <span class="nature-tag">探索中</span>
        </section>
        
        <footer class="mt-16 text-center">
            <div class="hand-drawn-line w-16 mx-auto mb-4"></div>
            <p class="font-serif italic text-sm text-[#5a5a5a]">Owltree · 与自然同行</p>
        </footer>
    </div>
</body>
</html>
